function svCI(){

function mChart(data){
  if(!data||data.length<2)return '';
  var W=300,H=80,pad=20,color='#818cf8';
  var vals=data.map(function(c){return parseFloat(c.w)});
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),rng=mx-mn||1;
  var pts=vals.map(function(v,i){return(pad+(i/(data.length-1))*(W-pad*2))+','+(H-pad-((v-mn)/rng)*(H-pad*2));});
  var s='<svg width="'+W+'" height="'+H+'" style="display:block;overflow:visible"><polyline points="'+pts.join(' ')+'" fill="none" stroke="'+color+'" stroke-width="2"/>';
  vals.forEach(function(v,i){var xy=pts[i].split(',');s+='<circle cx="'+xy[0]+'" cy="'+xy[1]+'" r="3" fill="'+color+'"/><text x="'+xy[0]+'" y="'+(H-4)+'" text-anchor="middle" fill="#444" font-size="8">'+data[i].date.slice(5)+'</text>';if(i===vals.length-1)s+='<text x="'+(parseFloat(xy[0])+5)+'" y="'+(parseFloat(xy[1])-5)+'" fill="'+color+'" font-size="10" font-weight="bold">'+v+'</text>';});
  return s+'</svg>';
}
